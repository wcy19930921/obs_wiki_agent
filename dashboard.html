<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌶️ 小米辣的个人知识库</title>
<style>
:root{
  --bg:#f8f9fa; --surface:#fff; --text:#1a1a2e; --muted:#6b7280;
  --accent:#f59e0b; --accent2:#3b82f6; --border:#e5e7eb; --shadow:0 1px 3px rgba(0,0,0,.06);
  --card-radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:.8rem;position:sticky;top:0;z-index:10}
.header h1{font-size:1.15rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.header nav{display:flex;gap:1.5rem;margin-left:auto;font-size:.85rem}
.header nav a{color:var(--muted);text-decoration:none;transition:color .15s}
.header nav a:hover,.header nav a.active{color:var(--accent2)}
.container{max-width:1060px;margin:0 auto;padding:2rem 1.5rem}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:1.2rem 1.4rem;box-shadow:var(--shadow)}
.stat-card .num{font-size:1.8rem;font-weight:700;line-height:1.2}
.stat-card .label{font-size:.8rem;color:var(--muted);margin-top:.2rem}
.stat-card.accent{border-left:3px solid var(--accent)}
.stat-card.accent .num{color:var(--accent)}
.section-title{font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:1rem}
.domain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:2rem}
.domain-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:1.3rem 1.2rem;text-decoration:none;color:inherit;transition:all .2s;box-shadow:var(--shadow);cursor:pointer;display:block}
.domain-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);border-color:var(--accent2)}
.domain-card .emoji{font-size:1.6rem;margin-bottom:.5rem}
.domain-card .name{font-weight:600;font-size:.95rem;margin-bottom:.2rem}
.domain-card .desc{font-size:.78rem;color:var(--muted);line-height:1.4}
.domain-card .count{font-size:.8rem;color:var(--accent);margin-top:.6rem;font-weight:600}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:1.2rem 1.4rem;box-shadow:var(--shadow)}
.detail-card h3{font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:.8rem}
.bar{display:flex;align-items:center;gap:.6rem;margin:.35rem 0;font-size:.85rem}
.bar .label{width:60px;color:var(--muted);flex-shrink:0}
.bar .track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar .fill{height:100%;border-radius:3px;transition:width .4s}
.fill-entity{background:var(--accent2)}.fill-concept{background:#22c55e}.fill-comparison{background:var(--accent)}.fill-query{background:#a855f7}
.bar .val{width:28px;text-align:right;font-weight:500;flex-shrink:0}
.tag{display:inline-block;padding:.15em .55em;border-radius:4px;font-size:.75rem;background:#eff6ff;color:#2563eb;margin:.15rem}
.recent-item{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.84rem}
.recent-item:last-child{border-bottom:none}
.recent-date{font-size:.72rem;color:var(--muted);min-width:44px}
.recent-badge{font-size:.65rem;padding:.1em .4em;border-radius:3px;min-width:38px;text-align:center;font-weight:600}
.rb-entity{background:#eff6ff;color:#2563eb}.rb-concept{background:#f0fdf4;color:#16a34a}
.rb-comparison{background:#fffbeb;color:#d97706}.rb-query{background:#faf5ff;color:#9333ea}
.conf-row{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;font-size:.85rem}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-high{background:#22c55e}.dot-med{background:var(--accent)}.dot-low{background:#ef4444}
.empty-state{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty-state h2{font-size:1.2rem;color:var(--text);margin-bottom:.3rem}
.footer{text-align:center;padding:2rem;font-size:.78rem;color:var(--muted);border-top:1px solid var(--border);margin-top:2rem}
@media(max-width:768px){.stats-row,.domain-grid,.detail-grid{grid-template-columns:1fr}.header{padding:.8rem 1rem}}
</style>
</head>
<body>

<div class="header">
  <h1>🌶️ 小米辣的个人知识库</h1>
  <nav>
    <a href="dashboard.html" class="active">仪表盘</a>
    <a href="index.html?domain=it-security">文档</a>
  </nav>
</div>

<div class="container" id="app"><div class="empty-state"><p>加载中...</p></div></div>

<script>
async function init(){
  try{
    var r=await fetch('stats.json');var s=await r.json();
    var dr=await fetch('domains.json');var domains=await dr.json();
    render(s,domains.domains)
  }catch(e){
    document.getElementById('app').innerHTML='<div class="empty-state"><h2>📊 暂无数据</h2><p>等 Wiki 有页面就自动生成~</p></div>'
  }
}

function render(s,domains){
  if(s.total_pages===0){
    document.getElementById('app').innerHTML='<div class="empty-state"><h2>🌱 知识库还是空的</h2><p style="color:var(--muted)">板块已就绪：IT安全 · 汽车安全 · 投资 · 日常 · AI</p><p style="margin-top:1rem;font-size:.85rem;color:var(--muted)">开始往里喂材料吧</p></div>';
    return
  }
  var maxType=Math.max(1,...Object.values(s.type_count));
  var html='';

  // 总览统计
  html+='<div class="stats-row">';
  html+='<div class="stat-card accent"><div class="num">'+s.total_pages+'</div><div class="label">📄 总页面</div></div>';
  html+='<div class="stat-card"><div class="num" style="color:var(--accent2)">'+s.trend['7d']+'</div><div class="label">📈 近7天更新</div></div>';
  html+='<div class="stat-card"><div class="num" style="color:#22c55e">'+s.confidence_count.high+'</div><div class="label">✅ 高置信度</div></div>';
  html+='<div class="stat-card"><div class="num" style="color:'+(s.contested>0?'#ef4444':'var(--muted)')+'">'+s.contested+'</div><div class="label">⚠️ 争议条目</div></div>';
  html+='</div>';

  // 板块卡片
  html+='<div class="section-title">📂 知识板块</div>';
  html+='<div class="domain-grid">';
  var domainMap={};
  s.domains.forEach(function(d){domainMap[d.id]=d.count});
  domains.forEach(function(d){
    var count=domainMap[d.id]||0;
    html+='<a class="domain-card" href="index.html?domain='+d.id+'"><div class="emoji">'+d.emoji+'</div><div class="name">'+d.name+'</div><div class="desc">'+d.desc+'</div><div class="count">'+count+' 篇</div></a>';
  });
  html+='</div>';

  // 类型分布 + 标签云
  html+='<div class="detail-grid">';
  html+='<div class="detail-card"><h3>📂 按类型</h3>';
  var types={entity:'实体',concept:'概念',comparison:'对比',query:'查询'};
  var fills={entity:'fill-entity',concept:'fill-concept',comparison:'fill-comparison',query:'fill-query'};
  Object.keys(types).forEach(function(t){
    html+='<div class="bar"><span class="label">'+types[t]+'</span><div class="track"><div class="fill '+fills[t]+'" style="width:'+(s.type_count[t]/maxType*100)+'%"></div></div><span class="val">'+s.type_count[t]+'</span></div>';
  });
  html+='</div>';
  
  html+='<div class="detail-card"><h3>🏷️ 热门标签</h3>';
  s.top_tags.forEach(function(t){
    var size=.72+t.count/maxType*.25;
    html+='<span class="tag" style="font-size:'+size+'rem">'+t.name+' '+t.count+'</span>';
  });
  html+='</div>';
  html+='</div>';

  // 最近更新 + 更新趋势
  html+='<div class="detail-grid">';
  html+='<div class="detail-card"><h3>📅 最近更新</h3>';
  s.recent.slice(0,8).forEach(function(p){
    html+='<div class="recent-item"><span class="recent-date">'+(p.updated.slice(-5)||'-')+'</span><span class="recent-badge rb-'+p.type+'">'+p.type+'</span><span>'+p.title+'</span></div>';
  });
  html+='</div>';
  
  html+='<div class="detail-card"><h3>📊 更新趋势</h3>';
  html+='<div class="bar"><span class="label">30天</span><div class="track"><div class="fill fill-entity" style="width:100%"></div></div><span class="val">'+s.trend['30d']+'</span></div>';
  html+='<div class="bar"><span class="label">14天</span><div class="track"><div class="fill fill-concept" style="width:'+(s.trend['14d']/Math.max(1,s.trend['30d'])*100)+'%"></div></div><span class="val">'+s.trend['14d']+'</span></div>';
  html+='<div class="bar"><span class="label">7天</span><div class="track"><div class="fill fill-comparison" style="width:'+(s.trend['7d']/Math.max(1,s.trend['30d'])*100)+'%"></div></div><span class="val">'+s.trend['7d']+'</span></div>';
  html+='<div style="margin-top:.8rem;font-size:.82rem;color:var(--muted)">'+(s.trend['7d']>0?'🔥 持续更新中':s.trend['14d']>0?'📖 近期有更新':'💤 最近较安静')+'</div>';
  html+='</div>';
  html+='</div>';

  // 置信度
  html+='<div class="detail-card" style="margin-bottom:2rem"><h3>🎯 置信度分布</h3><div class="conf-row"><div><span class="dot dot-high"></span>高：<strong>'+s.confidence_count.high+'</strong></div><div><span class="dot dot-med"></span>中：<strong>'+s.confidence_count.medium+'</strong></div><div><span class="dot dot-low"></span>低：<strong>'+s.confidence_count.low+'</strong></div>'+(s.contested>0?'<div>⚠️ 争议：<strong style="color:#ef4444">'+s.contested+'</strong></div>':'')+'</div></div>';

  document.getElementById('app').innerHTML=html;
}

init();
</script>

<div class="footer">小米辣 · 持续积累的知识复利</div>
</body>
</html>
