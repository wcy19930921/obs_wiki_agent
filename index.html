<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小米辣的个人知识库</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--accent:#f59e0b;--accent2:#38bdf8;--border:#334155}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.header a{color:var(--accent2);text-decoration:none;font-size:.88rem}.header h1{font-size:1.2rem;color:var(--accent);flex:1;margin:0}
.container{max-width:900px;margin:0 auto;padding:1.2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.5rem}
.card:hover{border-color:var(--accent2)}
.card-row{display:flex;align-items:flex-start;gap:.8rem;cursor:pointer}
.card-icon{font-size:1.2rem;flex-shrink:0}.card-body{flex:1}
.card-title{font-weight:600;font-size:.92rem}.card-meta{font-size:.72rem;color:var(--muted);margin-top:.15rem}
.tag{display:inline-block;padding:.12em .5em;border-radius:4px;font-size:.7rem;background:#1e3a5f;color:#7dd3fc;margin:.1rem}
.badge{padding:.1em .45em;border-radius:4px;font-size:.68rem;font-weight:600}
.b-entity{background:#1e3a5f;color:#7dd3fc}.b-concept{background:#14532d;color:#86efac}
.b-comparison{background:#3b2e00;color:#fcd34d}.b-query{background:#3b0764;color:#c084fc}
.md-view{line-height:1.8;padding-bottom:2rem}
.md-view h1{font-size:1.3rem;margin:1rem 0}.md-view h2{font-size:1.1rem;margin:1.2rem 0 .4rem;border-bottom:1px solid var(--border);padding-bottom:.2rem}
.md-view p{margin:.5rem 0}.md-view ul,.md-view ol{margin:.4rem 0;padding-left:1.5rem}.md-view li{margin:.2rem 0}
.md-view code{background:var(--border);padding:.12em .35em;border-radius:3px;font-size:.85em}
.md-view pre{background:#0f172a;padding:.8rem;border-radius:6px;overflow-x:auto;margin:.8rem 0;border:1px solid var(--border);font-size:.82rem}
.md-view pre code{background:none;padding:0}
.md-view blockquote{border-left:3px solid var(--accent2);padding:.3rem .8rem;margin:.6rem 0;color:var(--muted);font-style:italic}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}.empty h3{font-size:1rem;color:var(--text);margin-bottom:.4rem}
.stats-bar{display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;font-size:.82rem;color:var(--muted)}
@media(max-width:768px){.header{padding:.8rem}.container{padding:.8rem}}
</style>
</head>
<body>

<div class="header">
  <a href="dashboard.html">← 仪表盘</a>
  <h1 id="htitle">📂 浏览文档</h1>
  <a href="#" id="backBtn" style="display:none" onclick="showList()">← 返回列表</a>
</div>

<div class="container" id="content"><div class="empty"><p>加载中...</p></div></div>

<script>
var DOMAINS={
  'it-security':{emoji:'🔐',name:'IT网络与数据安全'},
  'auto-security':{emoji:'🚗',name:'智能网联汽车安全'},
  'investment':{emoji:'📈',name:'投资之路'},
  'daily':{emoji:'📝',name:'日常记录'},
  'ai-learning':{emoji:'🤖',name:'AI学习'},
  'other':{emoji:'📦',name:'其他'}
};
var TYPES={entity:'实体',concept:'概念',comparison:'对比',query:'查询'};

var allPages=[],currentDomain='',viewingPage=null;

async function init(){
  var p=new URLSearchParams(location.search);
  currentDomain=p.get('domain')||'';
  if(!currentDomain){location.href='dashboard.html';return}
  var d=DOMAINS[currentDomain]||{emoji:'📂',name:currentDomain};
  document.getElementById('htitle').textContent=d.emoji+' '+d.name;

  try{
    var r=await fetch('page_list.json');allPages=await r.json()
  }catch(e){allPages=[]}
  showList()
}

function filterPages(){
  return allPages.filter(function(p){return p.domain===currentDomain})
}

function showList(){
  document.getElementById('backBtn').style.display='none';
  var pages=filterPages();
  if(pages.length===0){
    document.getElementById('content').innerHTML='<div class="empty"><h3>📭 暂无文档</h3><p>这个板块还没有内容</p><p style="margin-top:1rem;font-size:.85rem"><a href="dashboard.html" style="color:var(--accent2)">← 返回仪表盘</a></p></div>'
    return
  }
  var html='<div class="stats-bar">共 <strong>'+pages.length+'</strong> 篇</div>';
  pages.forEach(function(p){
    html+='<div class="card"><div class="card-row" onclick="viewPage(\''+p.path+'\',\''+p.title.replace(/'/g,"\\'")+'\')">'+
      '<div class="card-icon">📄</div>'+
      '<div class="card-body">'+
        '<div class="card-title">'+p.title+'</div>'+
        '<div class="card-meta">'+
          '<span class="badge b-'+p.type+'">'+TYPES[p.type]+'</span> · '+p.updated+
        '</div>'+
        '<div style="margin-top:.3rem">'+(p.tags||[]).slice(0,4).map(function(t){return '<span class="tag">'+t+'</span>'}).join('')+'</div>'+
      '</div></div></div>'
  });
  document.getElementById('content').innerHTML=html
}

async function viewPage(path,title){
  document.getElementById('htitle').textContent=title;
  document.getElementById('backBtn').style.display='inline';
  document.getElementById('content').innerHTML='<div class="empty"><p>加载中...</p></div>';
  try{
    var r=await fetch(path);var md=await r.text();
    md=md.replace(/^---[\s\S]*?---\n*/,'');
    md=md.replace(/\[\[([^\]]+)\]\]/g,'$1');
    var h=md.split('\n').map(function(l){
      l=l.trim();if(!l)return'';
      if(l.startsWith('# '))return'<h1>'+l.slice(2)+'</h1>';
      if(l.startsWith('## '))return'<h2>'+l.slice(3)+'</h2>';
      if(l.startsWith('### '))return'<h3>'+l.slice(4)+'</h3>';
      if(l.startsWith('- '))return'<li>'+l.slice(2)+'</li>';
      if(l.startsWith('> '))return'<blockquote>'+l.slice(2)+'</blockquote>';
      if(l.startsWith('```'))return'';
      return'<p>'+l+'</p>'
    }).join('\n');
    h=h.replace(/<li>[\s\S]*?<\/li>/g,function(m){return'<ul>'+m+'</ul>'});
    document.getElementById('content').innerHTML='<div class="md-view">'+h+'</div>'
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty"><p>加载失败</p></div>'
  }
}

init();
</script>
</body>
</html>
